name: Release

# Triggered by pushing a tag like v0.1.0 (should match the "version" in package.json),
# or manually via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # Must run on Windows: the embedded Python runtime (pywin32), Calibre Portable,
    # and LibreOffice Portable extraction (PowerShell Expand-Archive) are Windows-only.
    runs-on: windows-latest

    steps:
      - name: Checkout (with LFS for bundled Calibre/LibreOffice zips)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build and publish draft GitHub Release
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
